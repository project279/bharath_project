<!DOCTYPE html>
<html>
<head>
<title>Chatbot Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin:0;
    padding:0;

    /* Background image */
    background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcREy1tNf5vgR0BPgN1bwAtADDwMpmIn_b6MUQ&s");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* title */
h2{
    color:white;
    margin-top:20px;
}

/* logout button */
button{
    padding:10px 18px;
    background:#1e3cff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0019b8;
}

/* chat container */
#chatbox{
    width:420px;
    height:300px;
    margin:30px auto;
    padding:15px;
    overflow-y:auto;

    background:rgba(255,255,255,0.9);
    border-radius:10px;
}

/* message input */
#msg{
    width:65%;
    padding:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

</style>

</head>

<body>

<h2>Chatbot Dashboard</h2>

<button onclick="logout()">Logout</button>

<div id="chatbox"></div>

<br>

<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>

<script src="script.js"></script>

</body>
</html>
